name: Despliegue Automático por FTP

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    name: Compilar y Subir Sitio
    runs-on: ubuntu-latest
    steps:
      - name: 1. Obtener el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar el entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Instalar dependencias del frontend
        run: npm ci

      - name: 4. Sincronizar catálogo e imágenes de productos
        run: npm run sync-catalogo || echo "sync fallo: se usa catalogo existente"

      - name: 5. Regenerar catálogo cifrado del admin
        run: npm run build-admin
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: 6. Compilar el sitio web (Astro Build)
        run: npm run build

      - name: 7. Subir archivos al Hosting por FTP Nativo
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          python - <<'PY'
          import ftplib
          import os
          import time
          from pathlib import Path

          local_root = Path("dist").resolve()
          remote_root = "/public_html"
          host = os.environ["FTP_SERVER"].strip().replace("ftp://", "").replace("ftps://", "").rstrip("/")
          port = int(os.environ.get("FTP_PORT") or 21)
          user = os.environ["FTP_USERNAME"]
          password = os.environ["FTP_PASSWORD"]

          MAX_ATTEMPTS = 5
          TIMEOUT = 120

          def connect():
              ftp = ftplib.FTP(timeout=TIMEOUT)
              print(f"Conectando a {host}:{port} ...")
              ftp.connect(host, port)
              ftp.login(user, password)
              ftp.set_pasv(True)
              return ftp

          def ensure_dir(ftp, remote_path):
              current = ""
              for part in remote_path.strip("/").split("/"):
                  current += f"/{part}"
                  try:
                      ftp.mkd(current)
                  except ftplib.error_perm as error:
                      if not str(error).startswith("550"):
                          raise

          def upload_dir(ftp, local_dir, remote_dir):
              ensure_dir(ftp, remote_dir)
              for item in local_dir.iterdir():
                  remote_path = f"{remote_dir.rstrip('/')}/{item.name}"
                  if item.is_dir():
                      upload_dir(ftp, item, remote_path)
                      continue
                  with item.open("rb") as file:
                      print(f"Subiendo {item} -> {remote_path}")
                      ftp.storbinary(f"STOR {remote_path}", file)

          def deploy():
              ftp = connect()
              try:
                  upload_dir(ftp, local_root, remote_root)
                  for obsolete_path in (
                      "/public_html/admin.catalogo.php",
                      "/public_html/admin-catalogo.php",
                  ):
                      try:
                          print(f"Eliminando obsoleto {obsolete_path}")
                          ftp.delete(obsolete_path)
                      except ftplib.error_perm as error:
                          if not str(error).startswith("550"):
                              raise
              finally:
                  try:
                      ftp.quit()
                  except Exception:
                      pass

          last_error = None
          for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                  print(f"== Intento de despliegue {attempt}/{MAX_ATTEMPTS} ==")
                  deploy()
                  print("Despliegue FTP completado correctamente.")
                  last_error = None
                  break
              except Exception as error:  # noqa: BLE001
                  last_error = error
                  wait = attempt * 20
                  print(f"Fallo el intento {attempt}: {error}")
                  if attempt < MAX_ATTEMPTS:
                      print(f"Reintentando en {wait}s ...")
                      time.sleep(wait)

          if last_error is not None:
              raise SystemExit(f"Despliegue FTP fallido tras {MAX_ATTEMPTS} intentos: {last_error}")
          PY
