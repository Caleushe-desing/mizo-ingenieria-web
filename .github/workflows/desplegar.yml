name: Despliegue Automático por FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Compilar y Subir Sitio
    runs-on: ubuntu-latest
    steps:
      - name: 1. Obtener el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar el entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Instalar dependencias del frontend
        run: npm ci

      - name: 4. Compilar el sitio web (Astro Build)
        run: npm run build

      - name: 5. Subir archivos al Hosting por FTP Nativo
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python - <<'PY'
          import ftplib
          import os
          from pathlib import Path

          local_root = Path("dist").resolve()
          remote_root = "/public_html"

          ftp = ftplib.FTP(timeout=90)
          ftp.connect(os.environ["FTP_SERVER"], 21)
          ftp.login(os.environ["FTP_USERNAME"], os.environ["FTP_PASSWORD"])
          ftp.set_pasv(True)

          def ensure_dir(remote_path):
              current = ""
              for part in remote_path.strip("/").split("/"):
                  current += f"/{part}"
                  try:
                      ftp.mkd(current)
                  except ftplib.error_perm as error:
                      if not str(error).startswith("550"):
                          raise

          def upload_dir(local_dir, remote_dir):
              ensure_dir(remote_dir)
              for item in local_dir.iterdir():
                  remote_path = f"{remote_dir.rstrip('/')}/{item.name}"
                  if item.is_dir():
                      upload_dir(item, remote_path)
                      continue
                  with item.open("rb") as file:
                      print(f"Subiendo {item} -> {remote_path}")
                      ftp.storbinary(f"STOR {remote_path}", file)

          upload_dir(local_root, remote_root)
          for obsolete_path in (
              "/public_html/admin.catalogo.php",
              "/public_html/admin-catalogo.php",
          ):
              try:
                  print(f"Eliminando obsoleto {obsolete_path}")
                  ftp.delete(obsolete_path)
              except ftplib.error_perm as error:
                  if not str(error).startswith("550"):
                      raise
          ftp.quit()
          PY
