name: Despliegue Automático por FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Compilar y Subir Sitio
    runs-on: ubuntu-latest
    steps:
      - name: 1. Obtener el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar el entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Instalar dependencias del proyecto
        run: npm ci

      - name: 4. Compilar el sitio web (Astro Build)
        run: npm run build

      - name: 5. Subir archivos compilados al Hosting por FTP Nativo
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "
          set ftp:ssl-allow no;
          set ftp:passive-mode true;
          open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ${{ secrets.FTP_SERVER }};
          mirror -R ./dist/ /public_html/ --delete --verbose;
          quit
          "
