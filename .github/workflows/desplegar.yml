name: Despliegue Automático por FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Compilar y Subir Sitio
    runs-on: ubuntu-latest
    steps:
      - name: 1. Obtener el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar el entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Instalar dependencias del proyecto
        run: npm ci

      - name: 4. Compilar el sitio web (Astro Build)
        run: npm run build

      - name: 5. Subir archivos al Hosting
        uses: quadrasystems/ftp-deploy-action@v3.0.0
        with:
          ftp-server: ${{ secrets.FTP_SERVER }}
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist
          remote-dir: /public_html
          passive-mode: true
