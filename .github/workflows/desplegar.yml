name: Despliegue Automático por FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Compilar y Subir Sitio
    runs-on: ubuntu-latest
    steps:
      - name: 1. Obtener el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar el entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Instalar dependencias del proyecto
        run: npm ci

      - name: 4. Compilar el sitio web (Astro Build)
        run: npm run build

      - name: 5. Subir archivos compilados al Hosting por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          state-name: .ftp-deploy-sync-state.json
          port: 21
          security: loose
          passive: true
